<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vigente App — Bienvenido</title>
  <link rel="stylesheet" href="./src/styles/components.css" />
  <link rel="stylesheet" href="./src/styles/login.css" />
</head>
<body>
  <main class="sc-login-page" aria-label="Pantalla de bienvenida e inicio de sesión">

    <!-- Logo -->
    <header class="sc-login-header">
      <a class="sc-logo" href="#" aria-label="Senior Connexion, compañía que te entiende">
        <!-- Ícono: dos personas que forman un corazón -->
        <svg class="sc-logo-icon" width="52" height="52" viewBox="0 0 52 52" fill="none" aria-hidden="true">
          <circle cx="18" cy="15" r="6.5" fill="#007d7a"/>
          <circle cx="34" cy="15" r="6.5" fill="#007d7a"/>
          <path d="M7 27C7 20 15.5 16 26 23.5C36.5 16 45 20 45 27C45 36.5 26 47 26 47C26 47 7 36.5 7 27Z" fill="#007d7a"/>
        </svg>
        <div>
          <span class="sc-logo-name">Senior<br>Connexion</span>
          <small class="sc-logo-tagline">Compañía que te entiende ❤</small>
        </div>
      </a>
    </header>

    <!-- Hero: foto de la agente + burbuja de voz -->
    <div class="sc-login-hero">
      <div class="sc-hero-photo">
        <!--
          Reemplazar este div por:
          <img src="./assets/carolina-hero.jpg" alt="Carolina, tu compañera de confianza">
          cuando se disponga de la foto real.
        -->
        <div class="sc-speech-bubble" role="note">
          <!-- Ícono de comillas -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#007d7a" aria-hidden="true">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
          </svg>
          <p>Hola, soy Carolina.<br>Estoy aquí para acompañarte.</p>
        </div>
      </div>
    </div>

    <!-- Bienvenida + acciones -->
    <section class="sc-login-body">
      <h1 class="sc-login-title">Bienvenido</h1>
      <p class="sc-login-subtitle">Tu compañía para conversar, aprender y disfrutar.</p>
      <span class="sc-login-heart" aria-hidden="true">❤</span>

      <div class="sc-login-actions">

        <!-- Botón principal: Ingresar -->
        <button class="sc-button sc-button-primary sc-button-block" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          Ingresar
        </button>

        <!-- Botón secundario: continuar con celular -->
        <button class="sc-button sc-button-outline sc-button-block" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="7" y="2" width="10" height="20" rx="2"/>
            <circle cx="12" cy="17" r="1" fill="currentColor" stroke="none"/>
          </svg>
          Continuar con celular
        </button>

        <!-- Enlace de ayuda -->
        <a class="sc-help-link" href="#" role="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.1 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"/>
            <circle cx="12" cy="17" r=".5" fill="currentColor" stroke="none"/>
          </svg>
          ¿Necesito ayuda?
        </a>

      </div>
    </section>

    <!-- Pie: señal de privacidad y confianza -->
    <footer class="sc-login-footer">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="#007d7a" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <p>Fácil de usar, privado y siempre disponible.<br>Tu tranquilidad es nuestra prioridad. ❤</p>
    </footer>

  </main>
</body>
</html>
