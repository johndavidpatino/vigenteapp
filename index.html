<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vigente App - Login</title>
  <link rel="stylesheet" href="./src/styles/components.css" />
</head>
<body>
  <main class="sc-page-shell sc-login-shell" aria-label="Pantalla de ingreso de Vigente App">
    <section class="sc-login-brand-block" aria-label="Marca Senior Connexion">
      <div class="sc-login-brand">
        <div class="sc-brand-mark" aria-hidden="true">
          <span class="sc-brand-figure sc-brand-figure-teal"></span>
          <span class="sc-brand-figure sc-brand-figure-coral"></span>
        </div>

        <div class="sc-brand-copy">
          <span class="sc-brand-title">Senior<br />Connexion</span>
          <p class="sc-brand-tagline">Compañía que te entiende <span aria-hidden="true">♥</span></p>
        </div>
      </div>
    </section>

    <section class="sc-login-hero sc-card" aria-labelledby="login-welcome-title">
      <div class="sc-login-hero-copy">
        <h1 id="login-welcome-title" class="sc-login-title">Bienvenido</h1>
        <p class="sc-login-lead">Tu compañía para conversar, aprender y disfrutar.</p>
        <span class="sc-login-heart" aria-hidden="true">♥</span>
      </div>

      <div class="sc-login-hero-media" aria-hidden="true">
        <svg class="sc-login-portrait-scene" viewBox="0 0 420 520" role="presentation">
          <defs>
            <linearGradient id="scPortraitWall" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#FFF9EF"></stop>
              <stop offset="100%" stop-color="#FFF1E6"></stop>
            </linearGradient>
            <linearGradient id="scPortraitTop" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#0B3558"></stop>
              <stop offset="100%" stop-color="#007D7A"></stop>
            </linearGradient>
            <linearGradient id="scPortraitHair" x1="0%" x2="100%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#0B3558"></stop>
              <stop offset="100%" stop-color="#005F63"></stop>
            </linearGradient>
            <linearGradient id="scPortraitSkin" x1="0%" x2="0%" y1="0%" y2="100%">
              <stop offset="0%" stop-color="#FFF1E6"></stop>
              <stop offset="100%" stop-color="#FFF9EF"></stop>
            </linearGradient>
          </defs>

          <rect width="420" height="520" fill="url(#scPortraitWall)"></rect>
          <circle cx="66" cy="376" r="46" fill="#EAF7F4"></circle>
          <rect x="292" y="42" width="90" height="112" rx="16" fill="#0B3558" opacity="0.12"></rect>
          <rect x="305" y="56" width="64" height="84" rx="10" fill="#FFF9EF"></rect>
          <rect x="0" y="420" width="420" height="100" fill="#0B3558" opacity="0.12"></rect>
          <rect x="40" y="318" width="70" height="96" rx="14" fill="#0B3558" opacity="0.12"></rect>
          <rect x="55" y="284" width="40" height="48" rx="20" fill="#FFF1E6" opacity="0.92"></rect>
          <rect x="63" y="240" width="24" height="56" rx="12" fill="#F26B55" opacity="0.6"></rect>
          <circle cx="75" cy="238" r="22" fill="#FFF9EF"></circle>

          <path d="M198 166c-58 0-104 46-104 104v66c0 28 18 49 43 62l18-71 29-13h35l29 13 18 71c25-13 43-34 43-62v-66c0-58-46-104-111-104z" fill="url(#scPortraitHair)"></path>
          <ellipse cx="207" cy="214" rx="59" ry="70" fill="url(#scPortraitSkin)"></ellipse>
          <path d="M156 207c14-37 53-66 94-66 30 0 57 15 71 38-11-56-55-95-113-95-60 0-106 43-114 101 15-20 36-31 62-31z" fill="url(#scPortraitHair)"></path>
          <path d="M144 276c14 25 36 40 63 40s49-15 63-40c-12 46-34 71-63 71s-51-25-63-71z" fill="#F26B55" opacity="0.16"></path>
          <ellipse cx="182" cy="214" rx="7" ry="5" fill="#0B3558"></ellipse>
          <ellipse cx="235" cy="214" rx="7" ry="5" fill="#0B3558"></ellipse>
          <path d="M177 196c9-9 19-11 31-8" stroke="#0B3558" stroke-width="4" stroke-linecap="round" fill="none"></path>
          <path d="M223 188c13-3 24 0 33 8" stroke="#0B3558" stroke-width="4" stroke-linecap="round" fill="none"></path>
          <path d="M210 221c1 10-2 17-8 23" stroke="#007D7A" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45"></path>
          <path d="M182 252c17 16 48 16 65 0" stroke="#F26B55" stroke-width="5" stroke-linecap="round" fill="none"></path>
          <circle cx="160" cy="236" r="10" fill="#F26B55" opacity="0.2"></circle>
          <circle cx="252" cy="236" r="10" fill="#F26B55" opacity="0.2"></circle>
          <circle cx="150" cy="232" r="7" fill="#F26B55"></circle>
          <circle cx="263" cy="232" r="7" fill="#F26B55"></circle>

          <path d="M127 452c9-75 39-123 80-123s71 48 80 123" fill="url(#scPortraitTop)"></path>
          <path d="M154 347c16 18 34 27 53 27s37-9 53-27v31c-11 18-28 30-53 30s-42-12-53-30z" fill="#FFF1E6"></path>
          <path d="M120 468c8-55 27-94 55-116 12 23 27 35 32 35s20-12 32-35c28 22 47 61 55 116" fill="url(#scPortraitTop)"></path>
        </svg>
      </div>

      <div class="sc-login-message" role="note" aria-label="Mensaje de Carolina">
        <span class="sc-login-message-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M7.6 18.4c-.3 0-.5-.1-.7-.3l-2.8-2.8H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8.5a2 2 0 0 1 2 2v8.3a2 2 0 0 1-2 2H9.5l-1.2 2.4c-.1.3-.4.4-.7.4Z"></path>
            <path d="M15.3 20.2c-.2 0-.4-.1-.6-.3l-1.4-1.8h-1.7a2 2 0 0 1-2-2V8.3a2 2 0 0 1 2-2H21a2 2 0 0 1 2 2v7.8a2 2 0 0 1-2 2h-3.4l-1.7 1.8c-.2.2-.4.3-.6.3Z"></path>
          </svg>
        </span>
        <p>Hola, soy Carolina.<br />Estoy aquí para acompañarte.</p>
      </div>
    </section>

    <section class="sc-login-actions" aria-label="Opciones de ingreso">
      <button class="sc-button sc-button-primary sc-login-button-main" type="button" aria-label="Ingresar">
        <svg class="sc-button-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2.5c-4.1 0-7.5 2.5-7.5 5.5a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1c0-3-3.4-5.5-7.5-5.5Z"></path>
        </svg>
        <span>Ingresar</span>
      </button>

      <button class="sc-button sc-button-secondary sc-login-button-secondary" type="button" aria-label="Continuar con celular">
        <svg class="sc-button-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 2.5h8A2.5 2.5 0 0 1 18.5 5v14A2.5 2.5 0 0 1 16 21.5H8A2.5 2.5 0 0 1 5.5 19V5A2.5 2.5 0 0 1 8 2.5Zm0 2A.5.5 0 0 0 7.5 5v14c0 .3.2.5.5.5h8a.5.5 0 0 0 .5-.5V5a.5.5 0 0 0-.5-.5Zm2.5 12.8h3a1 1 0 1 1 0 2h-3a1 1 0 1 1 0-2Z"></path>
        </svg>
        <span>Continuar con celular</span>
      </button>
    </section>

    <div class="sc-login-divider" aria-hidden="true">
      <span></span>
      <strong>o</strong>
      <span></span>
    </div>

    <a class="sc-login-help" href="#ayuda" aria-label="Necesito ayuda">
      <span class="sc-login-help-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="presentation">
          <path d="M12 22A10 10 0 1 1 22 12 10 10 0 0 1 12 22Zm0-18A8 8 0 1 0 20 12 8 8 0 0 0 12 4Z"></path>
          <path d="M11.9 14.9a1.1 1.1 0 0 1-1.1-1.1c0-1 .6-1.8 1.7-2.6.8-.5 1.2-1 1.2-1.8 0-1-.8-1.7-1.9-1.7a2.3 2.3 0 0 0-2 1.1 1 1 0 0 1-1.7-1 4.3 4.3 0 0 1 3.8-2.1c2.3 0 4 1.5 4 3.7 0 1.7-1 2.7-2.1 3.4-.8.5-1 1-1 1.4a1.1 1.1 0 0 1-1 1.1Zm0 4a1.3 1.3 0 1 1 1.3-1.3 1.3 1.3 0 0 1-1.3 1.3Z"></path>
        </svg>
      </span>
      <span>Necesito ayuda</span>
    </a>

    <article class="sc-login-trust sc-card sc-card-mint" aria-label="Mensaje de confianza y privacidad">
      <div class="sc-login-trust-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="presentation">
          <path d="M12 2.2 4.8 5v6.6c0 4.5 2.7 8.7 7.2 10.2 4.5-1.5 7.2-5.7 7.2-10.2V5Zm0 4.1a2.6 2.6 0 0 1 2.6 2.6v1.2h.3a1.3 1.3 0 0 1 1.3 1.3v4.2a1.3 1.3 0 0 1-1.3 1.3H9.1a1.3 1.3 0 0 1-1.3-1.3v-4.2a1.3 1.3 0 0 1 1.3-1.3h.3V8.9A2.6 2.6 0 0 1 12 6.3Zm0 1.9a.7.7 0 0 0-.7.7v1.2h1.4V8.9a.7.7 0 0 0-.7-.7Z"></path>
        </svg>
      </div>

      <div class="sc-login-trust-copy">
        <h2>Fácil de usar, privado y siempre disponible.</h2>
        <p>Tu tranquilidad es nuestra prioridad. <span aria-hidden="true">♥</span></p>
      </div>
    </article>
  </main>
</body>
</html>
